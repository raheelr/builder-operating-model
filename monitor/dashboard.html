<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Builder — Live Agent Monitor</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface-hover: #1c2129;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
    --purple: #bc8cff;
    --orange: #f0883e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    padding: 24px;
    min-height: 100vh;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  header h1 {
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
  }

  header h1 span {
    color: var(--accent);
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .connection-status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-muted);
  }

  .connection-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
  }

  .connection-dot.disconnected {
    background: var(--red);
  }

  .last-updated {
    font-size: 12px;
    color: var(--text-muted);
  }

  .stats-bar {
    display: flex;
    gap: 24px;
    margin-bottom: 24px;
  }

  .stat {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    min-width: 140px;
  }

  .stat-value {
    font-size: 28px;
    font-weight: 700;
    line-height: 1;
  }

  .stat-label {
    font-size: 12px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .stat.running .stat-value { color: var(--green); }
  .stat.completed .stat-value { color: var(--accent); }
  .stat.failed .stat-value { color: var(--red); }

  .section {
    margin-bottom: 32px;
  }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .section-title {
    font-size: 14px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
  }

  .agent-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
    margin-bottom: 8px;
    transition: background 0.15s;
  }

  .agent-card:hover {
    background: var(--surface-hover);
  }

  .agent-card.running {
    border-left: 3px solid var(--green);
  }

  .agent-card.completed {
    border-left: 3px solid var(--accent);
  }

  .agent-card.failed {
    border-left: 3px solid var(--red);
  }

  .agent-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .agent-name {
    font-weight: 600;
    font-size: 15px;
  }

  .agent-badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  .badge-running {
    background: rgba(63, 185, 80, 0.15);
    color: var(--green);
  }

  .badge-completed {
    background: rgba(88, 166, 255, 0.15);
    color: var(--accent);
  }

  .badge-failed {
    background: rgba(248, 81, 73, 0.15);
    color: var(--red);
  }

  .agent-description {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 10px;
  }

  .agent-meta {
    display: flex;
    gap: 20px;
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 10px;
  }

  .meta-item {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .meta-icon {
    font-size: 14px;
    opacity: 0.7;
  }

  .agent-activity {
    background: var(--bg);
    border-radius: 6px;
    padding: 10px 14px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 12px;
    color: var(--text-muted);
    max-height: 120px;
    overflow-y: auto;
  }

  .activity-line {
    padding: 2px 0;
    display: flex;
    gap: 8px;
  }

  .activity-tool {
    color: var(--purple);
    min-width: 60px;
  }

  .activity-detail {
    color: var(--text);
    opacity: 0.8;
  }

  .pulse {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s ease-in-out infinite;
    margin-right: 6px;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.85); }
  }

  .elapsed {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 13px;
    color: var(--yellow);
  }

  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--text-muted);
    font-size: 14px;
    background: var(--surface);
    border: 1px dashed var(--border);
    border-radius: 8px;
  }

  .empty-state .empty-icon {
    font-size: 32px;
    margin-bottom: 12px;
    opacity: 0.5;
  }

  .history-date {
    font-size: 13px;
    color: var(--text-muted);
    padding: 8px 0 4px;
    font-weight: 600;
  }

  .files-list {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 6px;
  }

  .file-tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    background: rgba(88, 166, 255, 0.1);
    color: var(--accent);
    font-family: monospace;
  }

  .toolbar {
    display: flex;
    gap: 8px;
  }

  .btn {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn:hover {
    background: var(--surface-hover);
    border-color: var(--accent);
  }

  .btn.active {
    background: rgba(88, 166, 255, 0.15);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Scrollbar styling */
  ::-webkit-scrollbar {
    width: 6px;
  }
  ::-webkit-scrollbar-track {
    background: transparent;
  }
  ::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 3px;
  }
</style>
</head>
<body>

<header>
  <h1><span>Builder</span> — Live Agent Monitor</h1>
  <div class="header-right">
    <div class="connection-status">
      <div class="connection-dot" id="connectionDot"></div>
      <span id="connectionLabel">Connected</span>
    </div>
    <span class="last-updated" id="lastUpdated">Updated just now</span>
  </div>
</header>

<div class="stats-bar" id="statsBar">
  <div class="stat running">
    <div>
      <div class="stat-value" id="runningCount">0</div>
      <div class="stat-label">Running</div>
    </div>
  </div>
  <div class="stat completed">
    <div>
      <div class="stat-value" id="completedCount">0</div>
      <div class="stat-label">Completed</div>
    </div>
  </div>
  <div class="stat failed">
    <div>
      <div class="stat-value" id="failedCount">0</div>
      <div class="stat-label">Failed</div>
    </div>
  </div>
</div>

<div class="section" id="runningSection">
  <div class="section-header">
    <div class="section-title">Running Agents</div>
  </div>
  <div id="runningAgents">
    <div class="empty-state">
      <div class="empty-icon">~</div>
      <div>No agents currently running</div>
      <div style="margin-top:4px; font-size:12px;">Agents will appear here when spawned via the Builder</div>
    </div>
  </div>
</div>

<div class="section" id="completedSection">
  <div class="section-header">
    <div class="section-title">Completed Today</div>
    <div class="toolbar">
      <button class="btn active" onclick="setFilter('all')">All</button>
      <button class="btn" onclick="setFilter('success')">Success</button>
      <button class="btn" onclick="setFilter('failed')">Failed</button>
    </div>
  </div>
  <div id="completedAgents">
    <div class="empty-state">
      <div class="empty-icon">~</div>
      <div>No completed agents yet today</div>
    </div>
  </div>
</div>

<div class="section" id="historySection">
  <div class="section-header">
    <div class="section-title">Session History</div>
  </div>
  <div id="historyAgents">
    <div class="empty-state">
      <div class="empty-icon">~</div>
      <div>No session history available</div>
    </div>
  </div>
</div>

<script>
  const API_BASE = '';
  let currentFilter = 'all';
  let connected = false;
  let lastData = null;

  function formatElapsed(seconds) {
    if (seconds < 60) return `${Math.floor(seconds)}s`;
    const m = Math.floor(seconds / 60);
    const s = Math.floor(seconds % 60);
    if (m < 60) return `${m}m ${s}s`;
    const h = Math.floor(m / 60);
    return `${h}h ${m % 60}m`;
  }

  function formatTime(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }

  function formatDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    const today = new Date();
    const yesterday = new Date(today);
    yesterday.setDate(yesterday.getDate() - 1);

    if (d.toDateString() === today.toDateString()) return 'Today';
    if (d.toDateString() === yesterday.toDateString()) return 'Yesterday';
    return d.toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' });
  }

  function timeSince(iso) {
    const seconds = (Date.now() - new Date(iso).getTime()) / 1000;
    if (seconds < 5) return 'just now';
    if (seconds < 60) return `${Math.floor(seconds)}s ago`;
    if (seconds < 3600) return `${Math.floor(seconds / 60)}m ago`;
    return `${Math.floor(seconds / 3600)}h ago`;
  }

  function renderRunningAgent(agent) {
    const elapsed = (Date.now() - new Date(agent.started_at).getTime()) / 1000;
    const activities = (agent.recent_activity || []).slice(-5).map(a => `
      <div class="activity-line">
        <span class="activity-tool">${escapeHtml(a.tool || '')}</span>
        <span class="activity-detail">${escapeHtml(a.detail || '')}</span>
      </div>
    `).join('');

    return `
      <div class="agent-card running">
        <div class="agent-top">
          <div class="agent-name"><span class="pulse"></span>${escapeHtml(agent.name)}</div>
          <div>
            <span class="elapsed">${formatElapsed(elapsed)}</span>
            <span class="agent-badge badge-running">Running</span>
          </div>
        </div>
        <div class="agent-description">${escapeHtml(agent.description || '')}</div>
        <div class="agent-meta">
          <div class="meta-item"><span class="meta-icon">T</span> ${agent.tool_calls || 0} tool calls</div>
          <div class="meta-item"><span class="meta-icon">S</span> Started ${formatTime(agent.started_at)}</div>
          ${agent.agent_type ? `<div class="meta-item"><span class="meta-icon">A</span> ${escapeHtml(agent.agent_type)}</div>` : ''}
        </div>
        ${activities ? `<div class="agent-activity">${activities}</div>` : ''}
      </div>
    `;
  }

  function renderCompletedAgent(agent) {
    const duration = agent.duration_seconds || 0;
    const status = agent.status === 'failed' ? 'failed' : 'completed';
    const badgeClass = status === 'failed' ? 'badge-failed' : 'badge-completed';
    const files = (agent.files_changed || []).slice(0, 8);

    return `
      <div class="agent-card ${status}" data-status="${status}">
        <div class="agent-top">
          <div class="agent-name">${escapeHtml(agent.name)}</div>
          <div>
            <span class="elapsed">${formatElapsed(duration)}</span>
            <span class="agent-badge ${badgeClass}">${status === 'failed' ? 'Failed' : 'Done'}</span>
          </div>
        </div>
        <div class="agent-description">${escapeHtml(agent.description || '')}</div>
        <div class="agent-meta">
          <div class="meta-item"><span class="meta-icon">T</span> ${agent.tool_calls || 0} tool calls</div>
          <div class="meta-item"><span class="meta-icon">F</span> ${(agent.files_changed || []).length} files</div>
          <div class="meta-item"><span class="meta-icon">S</span> ${formatTime(agent.started_at)} - ${formatTime(agent.completed_at)}</div>
        </div>
        ${files.length ? `
          <div class="files-list">
            ${files.map(f => `<span class="file-tag">${escapeHtml(f.split('/').pop())}</span>`).join('')}
          </div>
        ` : ''}
      </div>
    `;
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function setFilter(filter) {
    currentFilter = filter;
    document.querySelectorAll('.toolbar .btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    if (lastData) render(lastData);
  }

  function render(data) {
    lastData = data;

    // Stats
    const running = data.running || [];
    const completed = data.completed || [];
    const history = data.history || [];

    document.getElementById('runningCount').textContent = running.length;
    document.getElementById('completedCount').textContent = completed.filter(a => a.status !== 'failed').length;
    document.getElementById('failedCount').textContent = completed.filter(a => a.status === 'failed').length;

    // Running
    const runningEl = document.getElementById('runningAgents');
    if (running.length === 0) {
      runningEl.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">~</div>
          <div>No agents currently running</div>
          <div style="margin-top:4px; font-size:12px;">Agents will appear here when spawned via the Builder</div>
        </div>`;
    } else {
      runningEl.innerHTML = running.map(renderRunningAgent).join('');
    }

    // Completed today
    let filtered = completed;
    if (currentFilter === 'success') filtered = completed.filter(a => a.status !== 'failed');
    if (currentFilter === 'failed') filtered = completed.filter(a => a.status === 'failed');

    const completedEl = document.getElementById('completedAgents');
    if (filtered.length === 0) {
      completedEl.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">~</div>
          <div>No ${currentFilter === 'all' ? '' : currentFilter + ' '}agents yet today</div>
        </div>`;
    } else {
      completedEl.innerHTML = filtered.map(renderCompletedAgent).join('');
    }

    // History (grouped by date)
    const historyEl = document.getElementById('historyAgents');
    if (history.length === 0) {
      historyEl.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">~</div>
          <div>No session history available</div>
        </div>`;
    } else {
      const grouped = {};
      history.forEach(a => {
        const dateKey = formatDate(a.started_at);
        if (!grouped[dateKey]) grouped[dateKey] = [];
        grouped[dateKey].push(a);
      });
      historyEl.innerHTML = Object.entries(grouped).map(([date, agents]) => `
        <div class="history-date">${date}</div>
        ${agents.map(renderCompletedAgent).join('')}
      `).join('');
    }
  }

  async function poll() {
    try {
      const resp = await fetch(`${API_BASE}/api/status`);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();
      connected = true;
      document.getElementById('connectionDot').classList.remove('disconnected');
      document.getElementById('connectionLabel').textContent = 'Connected';
      document.getElementById('lastUpdated').textContent = `Updated ${timeSince(new Date().toISOString())}`;
      render(data);
    } catch (e) {
      connected = false;
      document.getElementById('connectionDot').classList.add('disconnected');
      document.getElementById('connectionLabel').textContent = 'Disconnected';
    }
  }

  // Poll every 2 seconds
  poll();
  setInterval(poll, 2000);

  // Update elapsed timers every second for running agents
  setInterval(() => {
    if (lastData && lastData.running && lastData.running.length > 0) {
      document.querySelectorAll('.agent-card.running .elapsed').forEach((el, i) => {
        const agent = lastData.running[i];
        if (agent) {
          const elapsed = (Date.now() - new Date(agent.started_at).getTime()) / 1000;
          el.textContent = formatElapsed(elapsed);
        }
      });
    }
  }, 1000);
</script>

</body>
</html>
